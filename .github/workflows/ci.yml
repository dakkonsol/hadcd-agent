name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt pins runtime + test deps (httpx, pydantic,
          # docker, python-kasa, pytest, pytest-asyncio).
          pip install -r agent/requirements.txt

      # The agent and hadcd_workloads suites run as separate invocations:
      # both are self-contained and this keeps collection unambiguous.
      - name: Run agent test suite
        run: python -m pytest agent -q

      - name: Run workloads test suite
        run: python -m pytest hadcd_workloads -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.22
      - run: ruff check agent hadcd_workloads

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    # Advisory only: a new CVE in a pinned dep should surface loudly but
    # must not block merging a security fix that is unrelated to it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit -r agent/requirements.txt
